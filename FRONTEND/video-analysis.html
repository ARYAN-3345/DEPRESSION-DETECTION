<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Analysis - Mental Wellness</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/video.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2 class="sidebar-title">🧠 Wellness</h2>

    <nav>
        <a href="main.html"><i class="fas fa-home"></i> Dashboard</a>
        <a href="assessment.html" class="active"><i class="fas fa-clipboard-list"></i> Assessment</a>
        <a href="results.html"><i class="fas fa-chart-line"></i> Results</a>
        <a href="index.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
</div>

<!-- Main -->
<div class="main-content">
<div class="container fade-in">

    <!-- Header -->
    <div class="card text-center">
        <h1 class="title">Video Emotion Analysis</h1>
        <p class="subtitle">Speak naturally while we analyze your voice and facial expressions</p>
    </div>

    <!-- Video Section -->
    <div class="card video-container">

        <video id="video" autoplay muted></video>

        <button id="startBtn" class="btn btn-primary full-width">
            Start Recording
        </button>

        <button id="stopBtn" class="btn btn-secondary full-width" disabled>
            Stop & Analyze
        </button>

    </div>

</div>
</div>

<script>
let mediaRecorder;
let recordedChunks = [];

const video = document.getElementById("video");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

// Start camera
startBtn.onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    video.srcObject = stream;

    recordedChunks = [];

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
            recordedChunks.push(e.data);
        }
    };

    mediaRecorder.start();

    startBtn.disabled = true;
    stopBtn.disabled = false;
};

// Stop recording
stopBtn.onclick = async () => {
    mediaRecorder.stop();

    mediaRecorder.onstop = async () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });

        const formData = new FormData();
        formData.append("video", blob);

        stopBtn.innerHTML = "Analyzing...";
        stopBtn.disabled = true;

        const response = await fetch("http://127.0.0.1:5000/analyze_video", {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        localStorage.setItem("result", JSON.stringify(result));
        window.location.href = "results.html";
    };
};
</script>

</body>
</html>
