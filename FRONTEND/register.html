<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Mental Wellness</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/register.css">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="center">

    <div class="register-wrapper">

        <div class="card fade-in">

            <!-- Logo -->
            <div class="logo-box">
                <i class="fas fa-user-plus"></i>
            </div>

            <!-- Title -->
            <h1 class="title text-center">Create Account</h1>
            <p class="subtitle text-center">Join your wellness journey</p>

            <!-- Form -->
            <form id="registerForm">

                <input class="input" type="email" id="email" placeholder="Email" required>
                <br><br>

                <input class="input" type="password" id="password" placeholder="Password" required>
                <br><br>

                <button type="submit" class="btn btn-primary full-width" id="registerBtn">
                    <i class="fas fa-user-plus"></i> Register
                </button>

            </form>

            <!-- Login Link -->
            <p class="login-text">
                Already have an account?
                <a href="index.html">Login</a>
            </p>

        </div>

    </div>

    <!-- JS -->
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById("registerBtn");
            btn.innerHTML = "Registering...";
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://127.0.0.1:5000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.status === "success") {
                    alert("Registered successfully");
                    window.location.href = "index.html";
                } else {
                    alert(data.message || "Registration failed");
                }

            } catch (error) {
                alert("Server not running");
            }

            btn.innerHTML = '<i class="fas fa-user-plus"></i> Register';
            btn.disabled = false;
        });
    </script>

</body>
</html>
