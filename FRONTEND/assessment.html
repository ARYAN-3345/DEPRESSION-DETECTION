<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment - Mental Wellness</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/main.css"> <!-- reuse sidebar -->
    <link rel="stylesheet" href="css/assessment.css">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <!-- Sidebar (same as main) -->
    <div class="sidebar">
        <h2 class="sidebar-title">🧠 Wellness</h2>

        <nav>
            <a href="main.html"><i class="fas fa-home"></i> Dashboard</a>
            <a href="assessment.html" class="active"><i class="fas fa-clipboard-list"></i> Assessment</a>
            <a href="results.html"><i class="fas fa-chart-line"></i> Results</a>
            <a href="index.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <div class="container fade-in">

            <!-- Header -->
            <div class="card text-center">
                <h1 class="title">Choose Your Assessment</h1>
                <p class="subtitle">
                    Select how you want to evaluate your mental wellness
                </p>
            </div>

            <!-- Options -->
            <div class="assessment-grid">

                <!-- Text Quiz -->
                <div class="card option-card">
                    <div class="option-icon">
                        <i class="fas fa-keyboard"></i>
                    </div>

                    <h2 class="title">Text Quiz</h2>
                    <p class="subtitle">
                        Answer structured questions about your feelings and experiences.
                    </p>

                    <a href="text-quiz.html" class="btn btn-primary full-width">
                        Start Quiz
                    </a>
                </div>

                <!-- Video Analysis -->
                <div class="card option-card">
                    <div class="option-icon">
                        <i class="fas fa-video"></i>
                    </div>

                    <h2 class="title">Video Analysis</h2>
                    <p class="subtitle">
                        Use camera and voice to detect emotional patterns.
                    </p>

                    <a href="video-analysis.html" class="btn btn-primary full-width">
                        Start Video
                    </a>
                </div>

            </div>

        </div>

    </div>

</body>
</html>
