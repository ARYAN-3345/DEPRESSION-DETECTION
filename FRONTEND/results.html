<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - Mental Wellness</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/results.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2 class="sidebar-title">🧠 Wellness</h2>

    <nav>
        <a href="main.html"><i class="fas fa-home"></i> Dashboard</a>
        <a href="assessment.html"><i class="fas fa-clipboard-list"></i> Assessment</a>
        <a href="results.html" class="active"><i class="fas fa-chart-line"></i> Results</a>
        <a href="index.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
</div>

<!-- Main -->
<div class="main-content">
<div class="container fade-in">

    <!-- Title -->
    <div class="card text-center">
        <h1 class="title">Your Wellness Report</h1>
        <p class="subtitle">Based on your assessment</p>
    </div>

    <!-- Result -->
    <div class="card text-center result-card">

        <h2 class="title" id="resultLabel">Loading...</h2>
        <p class="subtitle" id="resultDesc"></p>

    </div>

    <!-- Recommendations -->
    <div class="card">

        <h2 class="title">Recommendations</h2>

        <ul id="recommendations" class="recommendations-list">
        </ul>

    </div>

    <!-- Actions -->
    <div class="card text-center">

        <a href="assessment.html" class="btn btn-primary">
            Take Another Assessment
        </a>

    </div>

</div>
</div>

<script>
const result = JSON.parse(localStorage.getItem("result"));

const labelEl = document.getElementById("resultLabel");
const descEl = document.getElementById("resultDesc");
const recEl = document.getElementById("recommendations");

// Safety check
if (!result) {
    labelEl.innerText = "No Data Found";
} else {

    const prediction = result.prediction;

    labelEl.innerText = prediction;

    if (prediction === "Low") {
        descEl.innerText = "You show low signs of depression.";

        recEl.innerHTML = `
            <li>Maintain a healthy routine</li>
            <li>Stay socially connected</li>
            <li>Practice mindfulness</li>
        `;

    } else if (prediction === "Medium") {
        descEl.innerText = "Moderate indicators detected.";

        recEl.innerHTML = `
            <li>Try journaling your thoughts</li>
            <li>Exercise regularly</li>
            <li>Talk to close friends or family</li>
        `;

    } else {
        descEl.innerText = "High indicators detected. Consider professional help.";

        recEl.innerHTML = `
            <li>Consult a mental health professional</li>
            <li>Reach out to a trusted person</li>
            <li>Seek immediate support if needed</li>
        `;
    }
}
</script>

</body>
</html>
