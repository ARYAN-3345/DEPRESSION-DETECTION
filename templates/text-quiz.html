{% extends "base.html" %}

{% block title %}Text Quiz{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='text-quiz.css') }}">
{% endblock %}

{% block content %}

<div class="quiz-wrapper">

    <!-- HEADER -->
    <div class="quiz-header">
        <h2>Text Quiz Assessment</h2>
        <p>PHQ-9 Depression Screening</p>
    </div>

    <!-- PROGRESS -->
    <div class="progress-top">
        <span id="q-text">Question 1 of 9</span>
        <span id="percent">11% complete</span>
    </div>

    <div class="progress-bar">
        <div id="progress" class="progress-fill"></div>
    </div>

    <!-- CARD -->
    <div class="quiz-card">

        <h3 id="question">Loading...</h3>
        <p>Select the option that best describes your experience</p>

        <form>
            <div id="options"></div>

            <div class="quiz-actions">
                <button type="button" id="prevBtn" class="btn-prev">Previous</button>
                <button type="button" id="nextBtn" class="btn-next">Next →</button>
            </div>
        </form>

    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const questions = [
        "Little interest or pleasure in doing things?",
        "Feeling down, depressed, or hopeless?",
        "Trouble falling or staying asleep?",
        "Feeling tired or having little energy?",
        "Poor appetite or overeating?",
        "Feeling bad about yourself?",
        "Trouble concentrating?",
        "Moving or speaking slowly/restless?",
        "Thoughts of self-harm?"
    ];

    const options = [
        "Not at all",
        "Several days",
        "More than half the days",
        "Nearly every day"
    ];

    let current = 0;
    let answers = new Array(9).fill(null);

    function loadQuestion() {
        document.getElementById("question").innerText = questions[current];

        const container = document.getElementById("options");
        container.innerHTML = "";

        options.forEach((opt, i) => {
            const div = document.createElement("div");
            div.classList.add("option");

            div.innerHTML = `
                <input type="radio" name="q" ${answers[current] === i ? "checked" : ""}>
                <span>${opt}</span>
            `;

            div.onclick = () => {
                answers[current] = i;
                loadQuestion();
            };

            container.appendChild(div);
        });

        updateProgress();
    }

    function updateProgress() {
        const percent = Math.round(((current + 1) / questions.length) * 100);

        document.getElementById("progress").style.width = percent + "%";
        document.getElementById("q-text").innerText = `Question ${current + 1} of ${questions.length}`;
        document.getElementById("percent").innerText = percent + "% complete";
    }

    document.getElementById("nextBtn").onclick = async () => {

        if (answers[current] === null) {
            alert("Select an option");
            return;
        }

        if (current < questions.length - 1) {
            current++;
            loadQuestion();
        } else {

            const res = await fetch("/text_quiz", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ answers: answers })
            });

            const data = await res.json();

            if (data.status === "success") {
                window.location.href = "/results_page";
            }
        }
    };

    document.getElementById("prevBtn").onclick = () => {
        if (current > 0) {
            current--;
            loadQuestion();
        }
    };

    loadQuestion();
});
</script>

{% endblock %}
